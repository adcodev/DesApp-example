<div class="min-h-screen bg-gradient-to-br from-slate-50 via-white to-isil-light">
  <header class="sticky top-0 z-10 border-b border-slate-200/80 bg-white/80 backdrop-blur-md">
    <div class="mx-auto flex max-w-6xl items-center justify-between px-4 py-4 sm:px-6">
      <a routerLink="/users" class="flex items-center gap-3 transition-opacity hover:opacity-80">
        <div class="flex h-10 w-10 items-center justify-center rounded-xl bg-isil text-white shadow-md shadow-isil/25">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
          </svg>
        </div>
        <div>
          <p class="text-sm font-bold tracking-tight text-slate-800">ISIL</p>
          <p class="text-xs text-slate-500">E-commerce Admin</p>
        </div>
      </a>

      <nav class="flex items-center gap-1 rounded-xl bg-slate-100 p-1">
        <a
          routerLink="/users"
          routerLinkActive="bg-white text-isil shadow-sm"
          [routerLinkActiveOptions]="{ exact: true }"
          class="rounded-lg px-4 py-2 text-sm font-medium text-slate-600 transition-all"
        >
          Usuarios
        </a>
        <a
          routerLink="/users/reports"
          routerLinkActive="bg-white text-isil shadow-sm"
          class="rounded-lg px-4 py-2 text-sm font-medium text-slate-600 transition-all"
        >
          Reportes
        </a>
        <a
          routerLink="/register"
          routerLinkActive="bg-white text-isil shadow-sm"
          class="rounded-lg px-4 py-2 text-sm font-medium text-slate-600 transition-all"
        >
          Nuevo usuario
        </a>
      </nav>
    </div>
  </header>

  <main class="mx-auto max-w-6xl px-4 py-8 sm:px-6">
    <div class="mb-8">
      <h1 class="text-2xl font-bold tracking-tight text-slate-800 sm:text-3xl">{{ title() }}</h1>
      @if (subtitle()) {
        <p class="mt-1 text-slate-500">{{ subtitle() }}</p>
      }
    </div>

    <ng-content />
  </main>
</div>
