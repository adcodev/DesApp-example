<form [formGroup]="form()" (ngSubmit)="submitted.emit()" class="space-y-6" autocomplete="off">
  <div class="grid grid-cols-1 gap-5 md:grid-cols-2">
    <div>
      <label class="mb-2 block text-sm font-medium text-slate-700">Nombre *</label>
      <input
        type="text"
        formControlName="name"
        class="w-full rounded-xl border border-slate-200 bg-white px-4 py-3 text-slate-800 placeholder-slate-400 transition-all focus:border-isil focus:outline-none focus:ring-2 focus:ring-isil/20"
        placeholder="Juan Pérez"
      />
      @if (form().get('name')?.invalid && form().get('name')?.touched) {
        <p class="mt-1 text-sm text-red-500">El nombre es obligatorio</p>
      }
    </div>

    <div>
      <label class="mb-2 block text-sm font-medium text-slate-700">Role *</label>
      <select
        formControlName="role"
        class="w-full rounded-xl border border-slate-200 bg-white px-4 py-3 text-slate-800 transition-all focus:border-isil focus:outline-none focus:ring-2 focus:ring-isil/20"
      >
        <option value="" disabled>Seleccionar Rol</option>
        <option value="ADMIN">Admin</option>
        <option value="USER">User</option>
        <option value="10">10</option>
      </select>
      @if (form().get('role')?.invalid && form().get('role')?.touched) {
        <p class="mt-1 text-sm text-red-500">El rol es obligatorio</p>
      }
    </div>

    <div class="md:col-span-2">
      <label class="mb-2 block text-sm font-medium text-slate-700">Email *</label>
      <input
        type="email"
        formControlName="email"
        class="w-full rounded-xl border border-slate-200 bg-white px-4 py-3 text-slate-800 placeholder-slate-400 transition-all focus:border-isil focus:outline-none focus:ring-2 focus:ring-isil/20"
        placeholder="juan@email.com"
      />
      @if (form().get('email')?.invalid && form().get('email')?.touched) {
        <p class="mt-1 text-sm text-red-500">Ingresa un email válido</p>
      }
    </div>
  </div>

  <div
    class="flex flex-col-reverse gap-3 border-t border-slate-100 pt-6 sm:flex-row sm:justify-end"
  >
    <ng-content select="[actions]" />
    <button
      type="submit"
      [disabled]="form().invalid || loading()"
      class="inline-flex items-center justify-center gap-2 rounded-xl bg-isil px-6 py-3 font-semibold text-white shadow-md shadow-isil/25 transition-all hover:bg-isil-dark disabled:cursor-not-allowed disabled:opacity-50"
    >
      @if (loading()) {
        <svg
          class="h-5 w-5 animate-spin"
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24"
        >
          <circle
            class="opacity-25"
            cx="12"
            cy="12"
            r="10"
            stroke="currentColor"
            stroke-width="4"
          ></circle>
          <path
            class="opacity-75"
            fill="currentColor"
            d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"
          ></path>
        </svg>
      }
      {{ submitLabel() }}
    </button>
  </div>
</form>
